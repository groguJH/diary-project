spring.application.name=diary

spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

app.jwt.secret=${JWT_SECRET:dev-only-change-this-secret-key-for-local-diary-project}
app.jwt.access-token-validity-seconds=${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:3600}
app.jwt.refresh-token-validity-seconds=${JWT_REFRESH_TOKEN_VALIDITY_SECONDS:1209600}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

app.keep-alive.enabled=${KEEP_ALIVE_ENABLED:false}
app.keep-alive.url=${KEEP_ALIVE_URL:}
app.keep-alive.fixed-delay-ms=${KEEP_ALIVE_FIXED_DELAY_MS:600000}
app.keep-alive.initial-delay-ms=${KEEP_ALIVE_INITIAL_DELAY_MS:30000}
